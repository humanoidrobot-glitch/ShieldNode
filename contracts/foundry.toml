[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true

[profile.default.fuzz]
runs = 256

# Fork profile: run with `forge test --profile fork`
# Requires ETH_RPC_URL env var (e.g. Alchemy/Infura mainnet endpoint).
[profile.fork]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
eth_rpc_url = "${ETH_RPC_URL}"
