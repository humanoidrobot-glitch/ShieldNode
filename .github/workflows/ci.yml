name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  contracts:
    name: Solidity (forge)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Build contracts
        working-directory: contracts
        run: forge build

      - name: Run contract tests
        working-directory: contracts
        run: forge test -v

  contracts-gas:
    name: Solidity gas snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Gas snapshot
        working-directory: contracts
        run: forge snapshot

  node:
    name: Rust relay node
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            node/target
          key: ${{ runner.os }}-node-${{ hashFiles('node/Cargo.lock') }}

      - name: Clippy
        working-directory: node
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        working-directory: node
        run: cargo test

  client:
    name: Rust client (Tauri backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install system deps (Tauri + TUN)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            client/src-tauri/target
          key: ${{ runner.os }}-client-${{ hashFiles('client/src-tauri/Cargo.lock') }}

      - name: Clippy
        working-directory: client/src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        working-directory: client/src-tauri
        run: cargo test

  frontend:
    name: React frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install deps
        working-directory: client
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: client
        run: pnpm run build

      - name: Audit
        working-directory: client
        run: pnpm audit --audit-level=high || true

  security:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Audit node crate
        working-directory: node
        run: cargo audit

      - name: Audit client crate
        working-directory: client/src-tauri
        run: cargo audit
