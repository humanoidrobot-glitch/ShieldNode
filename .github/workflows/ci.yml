name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  contracts:
    name: Solidity (forge)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Build contracts
        working-directory: contracts
        run: forge build

      - name: Run contract tests
        working-directory: contracts
        run: forge test -v

  node:
    name: Rust relay node
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            node/target
          key: ${{ runner.os }}-node-${{ hashFiles('node/Cargo.lock') }}

      - name: Check
        working-directory: node
        run: cargo check

      - name: Test
        working-directory: node
        run: cargo test

  client:
    name: Rust client (Tauri backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps (Tauri + TUN)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            client/src-tauri/target
          key: ${{ runner.os }}-client-${{ hashFiles('client/src-tauri/Cargo.lock') }}

      - name: Check
        working-directory: client/src-tauri
        run: cargo check

      - name: Test
        working-directory: client/src-tauri
        run: cargo test

  frontend:
    name: React frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        working-directory: client
        run: npm ci

      - name: Build
        working-directory: client
        run: npm run build

      - name: Lint
        working-directory: client
        run: npm run lint --if-present
