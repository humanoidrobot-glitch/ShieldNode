# Reproducible build CI — produces the relay binary and publishes its hash.
# The hash is what clients check against in TEE attestation reports.

name: Reproducible Build

on:
  push:
    branches: [main]
    paths:
      - 'node/src/**'
      - 'node/Cargo.toml'
      - 'node/Cargo.lock'
      - 'node/Dockerfile.reproducible'
      - 'packages/shieldnode-types/**'
      - 'Cargo.toml'
  pull_request:
    paths:
      - 'node/src/**'
      - 'node/Cargo.toml'
      - 'node/Cargo.lock'
      - 'packages/shieldnode-types/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build reproducible binary
        run: |
          docker build -f node/Dockerfile.reproducible -t shieldnode-build .
          docker create --name extract shieldnode-build
          docker cp extract:/shieldnode ./node/shieldnode-relay
          docker rm extract

      - name: Compute and publish binary hash
        run: |
          HASH=$(sha256sum node/shieldnode-relay | awk '{print $1}')
          echo "## Reproducible Build Hash" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Binary: \`shieldnode-relay\`" >> $GITHUB_STEP_SUMMARY
          echo "SHA-256: \`${HASH}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This hash should match the TEE attestation report's binary measurement." >> $GITHUB_STEP_SUMMARY
          echo "BINARY_HASH=${HASH}" >> $GITHUB_ENV

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: shieldnode-relay
          path: node/shieldnode-relay

  verify:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: shieldnode-relay
          path: ./artifact

      - name: Rebuild and compare hash
        run: |
          docker build -f node/Dockerfile.reproducible -t shieldnode-verify .
          docker create --name verify-extract shieldnode-verify
          docker cp verify-extract:/shieldnode ./node/shieldnode-relay-verify
          docker rm verify-extract

          HASH_BUILD=$(sha256sum artifact/shieldnode-relay | awk '{print $1}')
          HASH_VERIFY=$(sha256sum node/shieldnode-relay-verify | awk '{print $1}')

          echo "Build hash:  ${HASH_BUILD}"
          echo "Verify hash: ${HASH_VERIFY}"

          if [ "$HASH_BUILD" = "$HASH_VERIFY" ]; then
            echo "MATCH — reproducible build confirmed"
          else
            echo "MISMATCH — builds are not reproducible"
            exit 1
          fi
